<div class="login-page">
  <div class="login-card">
    <div class="card-header">
      <a routerLink="/" class="back-link">← Back to Calculator</a>
      <h1 class="card-title">
        {{ mode() === 'login' ? 'Welcome back' : 'Create account' }}
      </h1>
      <p class="card-sub">{{ mode() === 'login' ? 'Sign in to view your history' : 'Register to save your history' }}</p>
    </div>

    <!-- Google OAuth Button -->
    <button class="google-btn" (click)="loginWithGoogle()" type="button">
      <svg width="18" height="18" viewBox="0 0 48 48">
        <path fill="#EA4335" d="M24 9.5c3.1 0 5.9 1.1 8.1 2.9l6-6C34.5 3.2 29.5 1 24 1 14.7 1 6.8 6.7 3.5 14.9l7 5.4C12.2 13.7 17.6 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.4 5.7c4.3-4 6.8-9.9 6.8-16.9z"/>
        <path fill="#FBBC05" d="M10.5 28.6A14.6 14.6 0 019.5 24c0-1.6.3-3.2.8-4.6l-7-5.4A23.5 23.5 0 001 24c0 3.8.9 7.4 2.5 10.6l7-5.4z"/>
        <path fill="#34A853" d="M24 47c6.5 0 11.9-2.1 15.9-5.8l-7.4-5.7c-2.1 1.4-4.8 2.3-8.5 2.3-6.4 0-11.8-4.3-13.7-10l-7 5.4C6.8 41.3 14.7 47 24 47z"/>
      </svg>
      Continue with Google
    </button>

    <div class="divider"><span>or</span></div>

    <!-- Email/Password Form -->
    <div class="form-fields">
      <div class="field">
        <label class="field-label">Email</label>
        <input
          type="email"
          class="field-input"
          placeholder="you@example.com"
          [ngModel]="email()"
          (ngModelChange)="email.set($event)"
          (keyup.enter)="submit()"
        />
      </div>

      <div class="field">
        <label class="field-label">Password</label>
        <input
          type="password"
          class="field-input"
          placeholder="••••••••"
          [ngModel]="password()"
          (ngModelChange)="password.set($event)"
          (keyup.enter)="submit()"
        />
      </div>

      <div class="field" *ngIf="mode() === 'register'">
        <label class="field-label">Confirm Password</label>
        <input
          type="password"
          class="field-input"
          placeholder="••••••••"
          [ngModel]="confirmPassword()"
          (ngModelChange)="confirmPassword.set($event)"
          (keyup.enter)="submit()"
        />
      </div>
    </div>

    <div class="error-msg" *ngIf="error()">{{ error() }}</div>
    <div class="success-msg" *ngIf="success()">{{ success() }}</div>

    <button class="submit-btn" [class.loading]="loading()" (click)="submit()" [disabled]="loading()">
      <span *ngIf="!loading()">{{ mode() === 'login' ? 'Sign In' : 'Create Account' }}</span>
      <span *ngIf="loading()" class="spinner"></span>
    </button>

    <p class="toggle-text">
      {{ mode() === 'login' ? "Don't have an account?" : 'Already have an account?' }}
      <button class="toggle-btn" (click)="toggleMode()">
        {{ mode() === 'login' ? 'Register' : 'Sign In' }}
      </button>
    </p>
  </div>
</div>
